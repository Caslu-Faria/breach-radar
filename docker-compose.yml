services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: breach_radar
    ports:
      - "5432:5432"
    volumes:
      - breach_radar_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/breach_radar
      HIBP_API_URL: https://haveibeenpwned.com/api/v3/breaches
      HIBP_USER_AGENT: breach-radar-app (contato@example.com)
      HIBP_TIMEOUT_SECONDS: "10"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  breach_radar_pgdata:
